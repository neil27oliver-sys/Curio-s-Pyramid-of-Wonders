  <style>
    :root { --gold: #f4c542; --blue: #2a7de1; --emerald: #0a9b6b; }

    header { background: var(--blue); color: white; text-align:center; padding:1.5rem; }

    .pyramid { display:flex; flex-direction:column; align-items:center; margin:30px 0; }
    .row { display:flex; gap:4px; margin:2px 0; }
    .small-pyramid {
      width:42px; height:34px; background:#ff9800;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      display:flex; align-items:center; justify-content:center;
      color:white; font-size:1rem; font-weight:bold; box-shadow:0 3px 6px rgba(0,0,0,0.2);

    .completed { background:var(--emerald) !important; }
    .question { background:white; padding:25px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.15); margin:20px 0; }

    let progress = JSON.parse(localStorage.getItem('curioPyramid')) || {};

    function saveProgress() { localStorage.setItem('curioPyramid', JSON.stringify(progress)); }
    function totalCompleted() { return Object.values(progress).reduce((a,b)=>a+b,0); }

    function playCorrectSound() {
      const audio = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audio.createOscillator(); osc.frequency.value = 800; osc.connect(audio.destination);
      osc.start(); osc.stop(audio.currentTime + 0.15);
    }

    function launchConfetti() { confetti({particleCount:200, spread:80, origin:{y:0.6}}); }

    // FIXED PYRAMID - Now supports 90 pyramids (13 rows)
    function renderPyramid() {
      let html = `<div class="pyramid">`;
      let count = 0;
      const done = totalCompleted();
      for (let r = 1; r <= 13; r++) {
        const itemsInRow = r < 7 ? r : 13;   // Wider base
        html += `<div class="row">`;
        for (let i = 0; i < itemsInRow; i++) {
          if (count >= 90) break;
          const filled = count < done ? 'completed' : '';
          html += `<div class="small-pyramid ${filled}">${count < done ? '★' : ''}</div>`;
          count++;
        }
        html += `</div>`;
        if (count >= 90) break;
      }
      html += `</div><p style="font-size:1.4rem"><strong>${done}/90</strong> Emerald Pyramids Built!</p>`;
      return html;
    }

    function toggleMusic() {
      const music = document.getElementById('bgMusic');
      music.paused ? music.play() : music.pause();
    }

    function showHome() {
      const done = totalCompleted();
      let html = `<h2>Welcome back, explorer! 👋</h2>${renderPyramid()}`;
      if (done === 90) html += `<button onclick="showCertificate()" style="background:#4caf50;font-size:1.3rem;">🏆 Claim Certificate!</button>`;
      html += `<button onclick="showBooks()" style="font-size:1.2rem;padding:16px;">📚 Choose a Book</button>
               <button onclick="resetProgress()" style="background:#f44336;">Reset Pyramid</button>`;
      document.getElementById('app').innerHTML = html;
    }

    function showBooks() { /* same as before */ 
      let html = `<h2>Choose Your Adventure Book</h2>`;
      const titles = ["Wonders of Everyday Life","Secrets of How Things Move","Magic of Light, Sound & Ideas","Wonders of the Natural World","Amazing Animals We Know","Secrets of Rocks, Minerals & Gems","Food & Kitchen Wonders","Toys, Games & Play","Shapes (Grand Finale)"];
      for (let b = 1; b <= 9; b++) {
        const done = progress[b] || 0;
        html += `<button onclick="startBook(${b})" style="width:100%;margin:10px 0;text-align:left;">
          Book ${b}: ${titles[b-1]}<br><small>${done}/10 completed</small>
        </button>`;
      }
      html += `<button onclick="showHome()">← Back Home</button>`;
      document.getElementById('app').innerHTML = html;
    }

    function startBook(bookId) {
      const qList = allQuestions.filter(q => q.book === bookId);
      const next = (progress[bookId] || 0) + 1;
      if (next > 10) { alert("🌟 Book Complete!"); showHome(); return; }
      const q = qList[next-1];

      let html = `
        <div class="question">
          <h3>Book ${bookId} • Story ${next}/10</h3>
          <h2>${q.title}</h2>
          <div class="summary">${q.summary}</div>
          <p><strong>${q.q}</strong></p>
          <div class="options">
            ${q.a.map((opt,i) => `<button onclick="answer(${bookId},${next},${i},${q.c})">${String.fromCharCode(65+i)}. ${opt}</button>`).join('')}
          </div>
        </div>
        <button onclick="showBooks()">← Back to Books</button>`;
      document.getElementById('app').innerHTML = html;
    }

    function answer(bookId, storyNum, chosen, correct) {
      if (!progress[bookId]) progress[bookId] = 0;
      if (chosen === correct) {
        progress[bookId]++;
        saveProgress();
        playCorrectSound();
        launchConfetti();
        alert("🎉 Correct! +1 Emerald Pyramid!");
      } else {
        alert("Nice try! Keep exploring ❤️");
      }
      if (progress[bookId] === 10) launchConfetti();
      showHome();
    }

    function showCertificate() {
      document.getElementById('app').innerHTML = `
        <div style="text-align:center;background:white;padding:40px;border:10px solid gold;border-radius:20px;max-width:600px;margin:40px auto;">
          <h1>🏆 Certificate of Wonder 🏆</h1>
          <p>You completed all 90 stories and built the Great Pyramid!</p>
          <h2>You are an Official Curio Explorer!</h2>
          <button onclick="window.print()">🖨️ Print Certificate</button>
        </div>
        <button onclick="showHome()">← Back</button>`;
    }

    function resetProgress() {
      if (confirm("Reset the entire pyramid?")) {
        progress = {};
        localStorage.removeItem('curioPyramid');
        showHome();
      }
    }

    // Start
    showHome();
  </script>
